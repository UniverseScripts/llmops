version: "3.8"
services:
  llm-node:
    build: .
    container_name: enterprise-inference-node
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
              driver: nvidia
              count: all
    ports:
      - "8000:8000"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped
    networks:
      - edge-network
      
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: edge-ingress-tunnel
    command: tunnel --url http://llm-node:8000
    restart: unless-stopped
    depends_on:
      - llm-node
    networks:
      - edge-network

networks:
  edge-network:
    driver: bridge